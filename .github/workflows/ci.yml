name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DUFFEL_API_KEY: duffel_test_placeholder
      DUFFEL_API_URL: https://api.duffel.com
      DATABASE_URL: postgresql://127.0.0.1:5432/postgres?sslmode=disable
      DIRECT_URL: postgresql://127.0.0.1:5432/postgres?sslmode=disable
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4YW1wbGUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTYwMDAwMDAwMCwiZXhwIjoyMDAwMDAwMDAwfQ.placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Scoped lint: full `npm run lint` currently fails on pre-existing issues outside Duffel P0.
      - run: npx eslint src/lib/duffel src/lib/flights src/lib/services/flights src/lib/validations/flights.schema.ts src/lib/http/flights.client.ts src/lib/api/rate-limit-ip.ts app/api/v1/flights app/api/v1/webhooks/duffel src/lib/api/error-handler.ts src/lib/services/duffel --max-warnings 0

      - run: npm run test

      - run: npm run build
